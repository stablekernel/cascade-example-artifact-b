ci:
  config:
    schema_version: 1
    trunk_branch: main
    cli_version: v0.5.0-rc.10
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: widget-b
        workflow: .github/workflows/build-widget.yaml
        triggers: []
    notify:
      repo: stablekernel/cascade-example-primary
      workflow: external-update.yaml
      token: CASCADE_STATE_TOKEN
      deploy_name: artifact-b
      environment: staging
  state:
    prerelease:
      sha: c95221bcbaf5c4479dc07f99e8343e3e41f1d6ea
      version: v0.5.0-rc.10
      committed_at: "2026-06-26T04:48:31Z"
      committed_by: joshua-temple
