    schema_version: 1
    trunk_branch: main
    cli_version: v0.3.0-rc.26
    state_token: ${{ secrets.CASCADE_STATE_TOKEN }}
    manifest_file: .github/manifest.yaml
    manifest_key: ci
    triggers:
      - src/**
    builds:
      - name: widget-b
