# Scenario suite for cascade-example-artifact-b.
# Validates: build callback invocation, External Update dispatch to primary,
# and state write via CASCADE_STATE_TEST_TOKEN.
# Trigger manually or on schedule; never runs automatically on push.
name: Scenario Suite

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print steps without executing
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "0 6 * * 1"
  repository_dispatch:
    types:
      - run-scenario-suite

jobs:
  seed:
    name: Seed src change via PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write
    outputs:
      merge_sha: ${{ steps.merge.outputs.merge_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch, commit src change, open and merge PR
        id: merge
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "scenario-suite"
          git config user.email "scenario-suite@users.noreply.github.com"

          BRANCH="scenario/src-$(date +%s)-$RANDOM"
          git fetch origin main --quiet
          git checkout -B "$BRANCH" origin/main

          mkdir -p src
          echo "scenario change $(date -u +%FT%TWZ)" >> src/scenario.txt
          git add src/scenario.txt
          git commit -m "feat: scenario source change"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: scenario source change" \
            --body "Automated scenario run; drives orchestrate on merge."
          gh pr merge "$BRANCH" --squash --delete-branch

          git fetch origin main --quiet
          MERGE_SHA="$(git rev-parse origin/main)"
          echo "merge_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"

  wait-build:
    name: Wait for orchestrate run
    runs-on: ubuntu-latest
    needs: [seed]
    permissions:
      actions: write
    steps:
      - name: Wait for orchestrate run keyed on merge SHA
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
          MERGE_SHA: ${{ needs.seed.outputs.merge_sha }}
        run: |
          set -euo pipefail
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID="$(gh run list \
              --repo stablekernel/cascade-example-artifact-b \
              --workflow=orchestrate.yaml \
              --branch=main \
              --json databaseId,headSha,status \
              --jq ".[] | select(.headSha==\"${MERGE_SHA}\") | .databaseId" | head -n1)"
            [ -n "$RUN_ID" ] && break
            sleep 10
          done
          [ -n "$RUN_ID" ] || { echo "::error::no orchestrate run for ${MERGE_SHA}"; exit 1; }
          gh run watch "$RUN_ID" \
            --repo stablekernel/cascade-example-artifact-b \
            --exit-status

  dispatch-and-assert:
    name: Dispatch and Assert
    runs-on: ubuntu-latest
    needs: [seed, wait-build]
    permissions:
      contents: read
    steps:
      - name: Assert orchestrate completed
        run: |
          echo "orchestrate run for ${{ needs.seed.outputs.merge_sha }} passed"

      - name: Dispatch External Update on primary
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
          SHA: ${{ needs.seed.outputs.merge_sha }}
        run: |
          gh api repos/stablekernel/cascade-example-primary/dispatches \
            -X POST \
            -f event_type=external-update \
            -f "client_payload[source]=widget-b" \
            -f "client_payload[sha]=${SHA}" \
            -f "client_payload[version]=0.0.0-suite"
          echo "Dispatched external-update to stablekernel/cascade-example-primary"

      - name: Poll for primary acknowledgement
        env:
          GH_TOKEN: ${{ secrets.CASCADE_STATE_TEST_TOKEN }}
        run: |
          MAX=20
          COUNT=0
          while [ "$COUNT" -lt "$MAX" ]; do
            STATUS=$(gh api repos/stablekernel/cascade-example-primary/actions/workflows/external-update.yaml/runs \
              --jq '.workflow_runs[0].status' 2>/dev/null || echo "unknown")
            echo "attempt ${COUNT}: primary external-update status=${STATUS}"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "in_progress" ]; then
              echo "Primary acknowledged dispatch."
              exit 0
            fi
            COUNT=$((COUNT + 1))
            sleep 15
          done
          echo "::error::Primary did not acknowledge External Update dispatch within timeout"
          exit 1

  summary:
    name: Suite Summary
    runs-on: ubuntu-latest
    needs: [seed, wait-build, dispatch-and-assert]
    if: always()
    steps:
      - name: Write summary
        env:
          SEED_RESULT: ${{ needs.seed.result }}
          WAIT_RESULT: ${{ needs.wait-build.result }}
          DISPATCH_RESULT: ${{ needs.dispatch-and-assert.result }}
        run: |
          echo "## cascade-example-artifact-b Scenario Suite" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| seed | ${SEED_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| wait-build | ${WAIT_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dispatch-and-assert | ${DISPATCH_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
